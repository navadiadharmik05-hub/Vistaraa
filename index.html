<script>
    document.addEventListener("DOMContentLoaded", function () {
        const slides = document.querySelectorAll('.carousel-slide');
        const dotsContainer = document.getElementById('slide-dots');
        let current = 0;
        let timer;
        const SLIDE_DURATION = 5000;

        // Generates timeline navigation lines once
        slides.forEach((_, i) => {
            const step = document.createElement('div');
            step.className = 'timeline-step' + (i === 0 ? ' active' : '');
            const numStr = String(i + 1).padStart(2, '0');
            
            step.innerHTML = `
                <span class="step-number">${numStr}</span>
                <div class="step-line"><div class="fill"></div></div>
            `;
            
            step.addEventListener('click', () => { 
                goTo(i); 
                resetTimer(); 
            });
            dotsContainer.appendChild(step);
        });

        // Hide broken images gracefully
        slides.forEach(slide => {
            const img = slide.querySelector('img');
            if (img) {
                img.addEventListener('error', function () {
                    if (this.dataset.fallbackTried) slide.style.display = 'none';
                    this.dataset.fallbackTried = true;
                });
            }
        });

        function updatePanel(i) {
            const s = slides[i];
            
            // Inject text data cleanly into single nodes
            document.getElementById('pip-name').textContent = s.dataset.project || '—';
            document.getElementById('pip-location').textContent = s.dataset.location || '—';
            document.getElementById('pip-style').textContent = s.dataset.style || '—';
            document.getElementById('pip-area').textContent = s.dataset.area || '—';

            // Manage single collection of timeline lines
            const allSteps = document.querySelectorAll('.timeline-step');
            allSteps.forEach((step, index) => {
                step.classList.toggle('active', index === i);
            });
        }

        function goTo(i) {
            slides[current].classList.remove('active');
            current = i;
            slides[current].classList.add('active');
            updatePanel(current);
        }

        function next() { 
            goTo((current + 1) % slides.length); 
        }

        function resetTimer() {
            clearInterval(timer);
            timer = setInterval(next, SLIDE_DURATION);
        }

        updatePanel(0);
        resetTimer();
    });
</script>
</body>
